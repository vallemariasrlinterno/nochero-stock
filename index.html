<script>
// Firebase REST API - sin SDK, funciona en cualquier browser
const FB_PROJECT = 'nochero-stock';
const FB_API_KEY = 'AIzaSyBnuu5MZYI_E8qKWGjgEpjX638lzYK_nMY';
const FB_BASE = `https://firestore.googleapis.com/v1/projects/${FB_PROJECT}/databases/(default)/documents/nochero`;

async function fbSave(docName, data){
  try{
    // PATCH crea o actualiza el documento si no existe
    const url = `${FB_BASE}/${docName}?key=${FB_API_KEY}&updateMask.fieldPaths=data&updateMask.fieldPaths=updatedAt`;
    const body = {
      fields: {
        data: { stringValue: JSON.stringify(data) },
        updatedAt: { integerValue: String(Date.now()) }
      }
    };
    const res = await fetch(url, {
      method: 'PATCH',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify(body)
    });
    if(!res.ok){
      const err = await res.json();
      console.warn('fbSave error:', err);
    }
  } catch(e){ console.warn('fbSave error:', e); }
}

async function fbLoad(docName){
  try{
    const url = `${FB_BASE}/${docName}?key=${FB_API_KEY}`;
    const res = await fetch(url);
    if(res.status===404) return null; // documento no existe todavía
    if(!res.ok) return null;
    const json = await res.json();
    const val = json?.fields?.data?.stringValue;
    return val ? JSON.parse(val) : null;
  } catch(e){ console.warn('fbLoad error:', e); return null; }
}

// Inicializar documentos vacíos en Firebase si no existen
async function fbInit(){
  const docs = ['sales','cierres','passes','bloqueados','turnosActivos'];
  for(const d of docs){
    const existing = await fbLoad(d);
    if(existing===null){
      // Crear con datos del localStorage actual
      const localData = localStorage.getItem(`nv4_${d}`);
      const data = localData ? JSON.parse(localData) : {};
      await fbSave(d, data);
      console.log('fbInit created:', d);
    }
  }
}

// Polling para tiempo real (cada 5 segundos)
let _pollingInterval = null;
function startPolling(){
  if(_pollingInterval) return;
  _pollingInterval = setInterval(async ()=>{
    if(!currentUser) return;
    try{
      // Cargar cierres y turnosActivos
      const [cierres, activos, bloqueados] = await Promise.all([
        fbLoad('cierres'),
        fbLoad('turnosActivos'),
        fbLoad('bloqueados')
      ]);
      let changed = false;
      if(cierres){
        const prev = localStorage.getItem('nv4_cierres');
        const next = JSON.stringify(cierres);
        if(prev !== next){ localStorage.setItem('nv4_cierres', next); changed = true; }
      }
      if(activos){
        const prev = JSON.stringify(window._turnosActivos||{});
        const next = JSON.stringify(activos);
        if(prev !== next){ window._turnosActivos = activos; changed = true; }
      }
      if(bloqueados){
        const prev = localStorage.getItem('nv4_bloqueados');
        const next = JSON.stringify(bloqueados);
        if(prev !== next){ localStorage.setItem('nv4_bloqueados', next); changed = true; }
      }
      if(changed && currentUser?.role==='admin' && admSection==='resumen'){
        renderAdmContent();
      }
    } catch(e){}
  }, 3000);
}
function stopPolling(){
  if(_pollingInterval){ clearInterval(_pollingInterval); _pollingInterval = null; }
}

async function syncFromFirebase(){
  try{
    const [sales, cierres, passes, bloqueados, activos] = await Promise.all([
      fbLoad('sales'), fbLoad('cierres'), fbLoad('passes'),
      fbLoad('bloqueados'), fbLoad('turnosActivos')
    ]);
    if(sales) localStorage.setItem('nv4_sales', JSON.stringify(sales));
    if(cierres) localStorage.setItem('nv4_cierres', JSON.stringify(cierres));
    if(passes) localStorage.setItem('nv4_passes', JSON.stringify(passes));
    if(bloqueados) localStorage.setItem('nv4_bloqueados', JSON.stringify(bloqueados));
    if(activos) window._turnosActivos = activos;
  } catch(e){ console.warn('syncFromFirebase error:', e); }
}

async function marcarTurnoActivo(user){
  try{
    // Leer activos actuales de Firebase primero
    const current = await fbLoad('turnosActivos') || {};
    current[`T${T.num}`] = {user: user.name, cargo: user.cargo||'', desde: Date.now()};
    window._turnosActivos = current;
    await fbSave('turnosActivos', current);
    console.log('Turno marcado activo:', T.num, user.name);
  } catch(e){ console.warn('marcarTurnoActivo error:', e); }
}

async function marcarTurnoInactivo(){
  try{
    const current = await fbLoad('turnosActivos') || {};
    delete current[`T${T.num}`];
    window._turnosActivos = current;
    await fbSave('turnosActivos', current);
  } catch(e){}
}

// Heartbeat: actualiza timestamp cada 30s para indicar que sigue activo
let _heartbeatInterval = null;
function startHeartbeat(user){
  stopHeartbeat();
  _heartbeatInterval = setInterval(async ()=>{
    try{
      const current = await fbLoad('turnosActivos') || {};
      // Limpiar sesiones viejas (más de 2 horas sin heartbeat)
      const ahora = Date.now();
      for(const k of Object.keys(current)){
        if(ahora - (current[k].desde||0) > 2*3600*1000) delete current[k];
      }
      current[`T${T.num}`] = {user: user.name, cargo: user.cargo||'', desde: ahora};
      window._turnosActivos = current;
      await fbSave('turnosActivos', current);
    } catch(e){}
  }, 30000);
}
function stopHeartbeat(){
  if(_heartbeatInterval){ clearInterval(_heartbeatInterval); _heartbeatInterval = null; }
}

function subscribeRealtime(){
  startPolling();
}
</script>

<script>

// Arranque: tarde del 13/06/2026 = Planilla 19186

const START_YEAR=2026, START_MONTH=5, START_DAY=13; // jun=5
const START_TI=1; // tarde

const TURNOS=['mañana','tarde','noche'];
const CATS=['Lubricantes','Minimercado','Gas + Hielo'];

const USERS=[

const LS={

// ═══════════════════════════════════════════════════
// CÁLCULO DE PLANILLA
// Convierte fecha+turno a número de planilla y viceversa
// ═══════════════════════════════════════════════════
function startDate(){return new Date(START_YEAR,START_MONTH,START_DAY);}

// Diferencia en días entre dos fechas en formato "YYYY-MM-DD"
function diffDiasFk(fk1, fk2){
  const d1=new Date(fk1+'T12:00:00');
  const d2=new Date(fk2+'T12:00:00');
  return Math.round((d2-d1)/86400000);
}

// Número de planilla para un día (diff desde inicio) y turno (ti)
function planillaNum(diffDays, ti){
  const p0=parseInt(localStorage.getItem('nv4_p0')||String(P0));
  if(diffDays===0){
    if(ti<START_TI) return null; // no existe
    return p0+(ti-START_TI);
  }
  const turnosDia0=3-START_TI; // 2
  return p0+turnosDia0+(diffDays-1)*3+ti;
}

// Fecha actual en Argentina
function ahoraAR(){
  // Usar offset fijo UTC-3 para Argentina (no usa DST)
  const now=new Date();
  const utc=now.getTime()+now.getTimezoneOffset()*60000;
  const ar=new Date(utc-3*3600000); // UTC-3
  const y=ar.getFullYear();
  const mo=String(ar.getMonth()+1).padStart(2,'0');
  const d=String(ar.getDate()).padStart(2,'0');
  const h=ar.getHours();
  const mi=String(ar.getMinutes()).padStart(2,'0');
  return{
    fk:`${y}-${mo}-${d}`,
    hora:h,
    min:ar.getMinutes(),
    hhmm:`${String(h).padStart(2,'0')}:${mi}`
  };
}

// Turno actual
// Fecha de inicio como string fijo
const FK_INICIO='2026-06-13';

function turnoActual(){
  const ar=ahoraAR();
  let ti=ar.hora>=7&&ar.hora<15?0:ar.hora>=15&&ar.hora<23?1:2;
  let fk=ar.fk;
  // Turno noche antes de las 6: pertenece al día anterior
  if(ar.hora<7){
    const d=new Date(fk+'T12:00:00');
    d.setDate(d.getDate()-1);
    fk=d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');
    ti=2;
  }
  // Diff usando strings para evitar problemas de timezone en Date
  const diff=diffDiasFk(FK_INICIO, fk);
  const num=planillaNum(diff,ti);
  const fecha=new Date(fk+'T12:00:00').toLocaleDateString('es-AR');
  return{fk,ti,diff,num,nombre:TURNOS[ti],fecha,hora:ar.hhmm};
}

function turnoEfectivo(){
  // Si el turno calculado por hora ya está cerrado, avanzar al siguiente
  let t = turnoActual();
  if(isCerrado(t.num)){
    // Calcular el siguiente turno
    const nextTi = (t.ti + 1) % 3;
    let nextDiff = t.diff;
    let nextFk = t.fk;
    if(nextTi === 0 && t.ti === 2){
      // Pasamos de noche a mañana: avanzar un día
      const d = new Date(t.fk + 'T12:00:00');
      d.setDate(d.getDate() + 1);
      nextFk = d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');
      nextDiff = t.diff + 1;
    }
    const nextNum = planillaNum(nextDiff, nextTi);
    const nextFecha = new Date(nextFk+'T12:00:00').toLocaleDateString('es-AR');
    t = {
      fk: nextFk,
      ti: nextTi,
      diff: nextDiff,
      num: nextNum,
      nombre: TURNOS[nextTi],
      fecha: nextFecha,
      hora: t.hora
    };
  }
  return t;
}

const T=turnoEfectivo(); // calculado UNA vez al cargar

function pStr(n){return n?'#'+String(n).padStart(5,'0'):'—';}
function fkDisplay(fk){const[y,m,d]=fk.split('-');return`${parseInt(d)}/${parseInt(m)}/${y}`;}

// Planillas de un día (fk) en orden mañana/tarde/noche
function planillasDia(fk){
  const diff=diffDiasFk(FK_INICIO,fk);
  return TURNOS.map((_,ti)=>({
    ti, nombre:TURNOS[ti],
    num:planillaNum(diff,ti), // null si no existe
    k:planillaNum(diff,ti)?`T${planillaNum(diff,ti)}`:null
  }));
}

function addSale(cat,id,qty){
  const s=LS.sales(),k=`T${T.num}`;
  if(!s[k])s[k]={};if(!s[k][cat])s[k][cat]={};
  s[k][cat][id]=(s[k][cat][id]||0)+qty;
  LS.saveSales(s);
}
function setSale(cat,id,qty){
  const s=LS.sales(),k=`T${T.num}`;
  if(!s[k])s[k]={};if(!s[k][cat])s[k][cat]={};
  if(qty>0)s[k][cat][id]=qty;else delete s[k][cat][id];
  LS.saveSales(s);
}
function getSaleTurno(cat,id){return(LS.sales()[`T${T.num}`]?.[cat]?.[id])||0;}
function getSalesDia(cat,id,fk){
  const s=LS.sales();
  return planillasDia(fk).reduce((a,p)=>a+(p.k?(s[p.k]?.[cat]?.[id]||0):0),0);
}
function getSalesDiaCerrados(cat,id,fk){
  const s=LS.sales(),c=LS.cierres();
  return planillasDia(fk).reduce((a,p)=>{
    if(!p.k||!c[p.k]) return a;
    return a+(s[p.k]?.[cat]?.[id]||0);
  },0);
}
function isCerrado(num){return!!LS.cierres()[`T${num}`];}
function getStock(p){return p.stockInicial-getSalesDia(p.categoria,p.id,T.fk);}

let products={'Lubricantes':[],'Minimercado':[],'Gas + Hielo':[]};
let sheetsLoaded=false,sheetsLoading=false;

async function loadSheet(name){
  // Usar gviz/tq que es más confiable para nombres de hojas con espacios/caracteres
  const url=`https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:csv&sheet=${encodeURIComponent(name)}`;
  const text=await(await fetch(url)).text();
  const rows=text.trim().split('\n').map(l=>{
    const r=[],re=/("(?:[^"]|"")*"|[^,]*),?/g;let m;
    while((m=re.exec(l))!==null){if(m[0]==='')break;r.push(m[1].replace(/^"|"$/g,'').replace(/""/g,'"').trim())}
    return r;
  });
  const prods=[];let hf=false;
  for(const row of rows){
    const f=(row[0]||'').toUpperCase();
    const rowStr=row.join(',').toUpperCase();
    // Detectar fila de encabezado: contiene PRODUCTO o (PRECIO y está al inicio)
    if(f.includes('PRODUCTO')||(!hf&&rowStr.includes('PRECIO')&&rowStr.includes('STOCK'))){
      hf=true;continue;
    }
    if(!hf)continue;
    const nombre=(row[0]||'').trim();
    if(!nombre||f.includes('TOTAL')||nombre===',')continue;
    const precio=parseInt((row[1]||'').replace(/[$.\s]/g,'').replace(',',''))||0;
    // Gas+Hielo tiene columna extra "Agregados" antes de Ventas y Stock final
    // Columnas: nombre, precio, stock_ini, [agregados], ventas, stock_final, total
    const stockInicial=parseInt(row[2])||0;
    prods.push({id:nombre.toLowerCase().replace(/[^a-z0-9]/g,'_').replace(/__+/g,'_'),nombre,precio,stockInicial,categoria:name});
  }
  return prods;
}
async function loadAllSheets(){
  if(sheetsLoading)return;sheetsLoading=true;
  toast('Cargando desde Google Sheets...');
  try{
    const[a,b,c]=await Promise.all([loadSheet('Lubricantes'),loadSheet('Minimercado'),loadSheet('Gas + Hielo')]);
    products={'Lubricantes':a,'Minimercado':b,'Gas + Hielo':c};
    sheetsLoaded=true;
    toast(`✓ ${a.length+b.length+c.length} productos cargados`,'success');
    renderOpTable();updateCierreBar();
    if(admSection==='resumen'||admSection==='stock')renderAdmContent();
  }catch(e){toast('Error al cargar Sheets','error');}
  sheetsLoading=false;
}

async function doLogin(){
  const uid=document.getElementById('sel-user').value;
  const pass=document.getElementById('inp-pass').value;
  if(!uid||!pass){
    document.getElementById('login-msg').innerHTML='<div class="alert alert-danger"><i class="ti ti-alert-circle"></i> Completá todos los campos.</div>';
    return;
  }
  document.getElementById('login-msg').innerHTML='<div class="alert alert-info"><i class="ti ti-refresh"></i> Verificando...</div>';

  // Leer siempre de Firebase primero (fuente de verdad)
  const [fbPasses, fbBloqueados, fbCierres] = await Promise.all([
    fbLoad('passes'),
    fbLoad('bloqueados'),
    fbLoad('cierres')
  ]);
  if(fbPasses) localStorage.setItem('nv4_passes', JSON.stringify(fbPasses));
  if(fbBloqueados) localStorage.setItem('nv4_bloqueados', JSON.stringify(fbBloqueados));
  if(fbCierres) localStorage.setItem('nv4_cierres', JSON.stringify(fbCierres));

  const passes = fbPasses || JSON.parse(localStorage.getItem('nv4_passes')||'{}');
  const bloqueados = fbBloqueados || JSON.parse(localStorage.getItem('nv4_bloqueados')||'{}');

  const user = USERS.find(u=>u.id===uid && (passes[u.id]||u.pass)===pass);
  if(!user){
    document.getElementById('login-msg').innerHTML='<div class="alert alert-danger"><i class="ti ti-alert-circle"></i> Usuario o contraseña incorrectos.</div>';
    return;
  }
  if(bloqueados[uid]){
    document.getElementById('login-msg').innerHTML='<div class="alert alert-danger" style="font-size:15px;font-weight:700;justify-content:center;padding:1rem"><i class="ti ti-ban"></i> NO AUTORIZADO</div>';
    return;
  }

  // Verificar turno consecutivo (solo jefes de turno, no refuerzos ni admin)
  if(user.role !== 'admin' && !user.refuerzo){
    const cierresData = fbCierres || LS.cierres();
    const turnoAnterior = T.num - 1;
    if(turnoAnterior >= P0){
      const cierreAnterior = cierresData[`T${turnoAnterior}`];
      if(cierreAnterior && cierreAnterior.user === user.name){
        document.getElementById('login-msg').innerHTML=`<div class="alert alert-danger">
          <i class="ti ti-clock"></i> <strong>${user.name}</strong>, ya trabajaste el turno anterior (Planilla ${pStr(turnoAnterior)}).
          No podés hacer dos turnos consecutivos. Esperá al siguiente turno.
        </div>`;
        return;
      }
    }
  }

  currentUser=user;
  document.getElementById('login-msg').innerHTML='<div class="alert alert-info"><i class="ti ti-refresh"></i> Sincronizando datos...</div>';
  document.getElementById('inp-pass').value='';

  // Inicializar documentos en Firebase si es la primera vez
  await fbInit();
  // Sincronizar el resto de los datos
  await syncFromFirebase();
  document.getElementById('login-msg').innerHTML='';
  showScreen(user.role==='admin'?'admin':'operador');
  if(!sheetsLoaded) loadAllSheets();
  marcarTurnoActivo(user);
  subscribeRealtime();
  if(user.role !== 'admin') startHeartbeat(user);
}
function logout(){
  stopHeartbeat();
  marcarTurnoInactivo();
  currentUser=null;
  showScreen('login');
}

}

function buildOpTabs(){

    `<button class="tab ${i===currentCat?'active':''}" onclick="currentCat=${i};buildOpTabs();renderOpTable()">${c}</button>`
  ).join('');
}
function renderOpTable(){
  const search=(document.getElementById('op-search')?.value||'').toLowerCase();
  const el=document.getElementById('op-table');
  const cerrado=isCerrado(T.num);

  document.getElementById('op-banner').innerHTML=cerrado
    ?'<div class="alert alert-warning" style="margin-bottom:1rem"><i class="ti ti-lock"></i> <strong>Turno cerrado</strong> — Este turno ya fue cerrado e informado a administración. Debe iniciar sesión quien siga en su turno.</div>':'';

  if(!sheetsLoaded){el.innerHTML='<div class="alert alert-warning"><i class="ti ti-loader"></i> Cargando productos...</div>';return;}

  // Si hay búsqueda, buscar en todas las solapas y cambiar a la que tiene resultado
  if(search){
    let foundCat = -1;
    for(let i=0;i<CATS.length;i++){
      const found=(products[CATS[i]]||[]).some(p=>p.nombre&&p.nombre.toLowerCase().includes(search));
      if(found){foundCat=i;break;}
    }
    if(foundCat>=0 && foundCat!==currentCat){
      currentCat=foundCat;
      buildOpTabs();
    }
  }

  const cat=CATS[currentCat];
  const prods=(products[cat]||[]).filter(p=>p.nombre&&(!search||p.nombre.toLowerCase().includes(search)));

  if(!prods.length){el.innerHTML='<div class="alert alert-info">Sin productos encontrados.</div>';return;}

  let html=`<div class="table-wrap"><table><thead><tr>
    <th style="min-width:170px">Producto</th><th>Precio</th><th>Stock</th>
    <th class="col-venta">➕ Agregar venta</th>
    <th class="col-total">✏ Total del turno</th>
  </tr></thead><tbody>`;

  for(const p of prods){
    const sf=getStock(p);
    const ts=getSaleTurno(cat,p.id);
    const out=sf<=0 && p.stockInicial>0;
    const gasHielo=(cat==='Gas + Hielo');
    const maxVenta=gasHielo?9999:sf;
    const esc=p.id.replace(/'/g,"\\'");
    const pn=p.nombre.replace(/'/g,"\\'").replace(/"/g,'\\"');
    html+=`<tr>
      <td><strong>${p.nombre}</strong>${out?` <span class="badge badge-out">Sin stock</span>`:''}</td>
      <td>$${p.precio.toLocaleString('es-AR')}</td>
      <td class="${out?'stock-out':''}">${sf}</td>
      <td class="col-venta">
        <div class="venta-wrap">
          <input type="number" class="venta-input" id="q_${p.id}" min="0" value="0" ${out||cerrado?'disabled':''}
            oninput="chkOver(this,${maxVenta})"
            onkeydown="if(event.key==='Enter')doAdd('${cat}','${esc}','${pn}',${p.precio},${maxVenta})">
          <button class="btn-add" id="btn_${p.id}" ${out||cerrado?'disabled':''}
            onclick="doAdd('${cat}','${esc}','${pn}',${p.precio},${maxVenta})">
            <i class="ti ti-plus"></i> ✓
          </button>
        </div>
        <div id="warn_${p.id}" style="font-size:10px;color:#A32D2D;margin-top:2px;display:none">
          ⚠ Supera el stock (${maxVenta})
        </div>
      </td>
      <td class="col-total" id="tc_${p.id}">${renderTC(cat,p.id,ts,maxVenta,cerrado)}</td>
    </tr>`;
  }
  html+='</tbody></table></div>';
  el.innerHTML=html;
}
function renderTC(cat,pid,ts,sf,cerrado){
  if(cerrado) return ts>0?`<strong style="color:#27500A">${ts}</strong>`:'<span style="color:#9ca3af">—</span>';
  if(!ts) return '<span style="color:#9ca3af">—</span>';
  return `<div class="total-display" onclick="startEdit('${cat}','${pid}',${ts},${sf})" title="Tocá para corregir">
    <span class="total-num">${ts}</span><i class="ti ti-pencil" style="font-size:11px;color:#639922"></i>
  </div><div style="font-size:10px;color:#9ca3af">tocá para corregir</div>`;
}
function startEdit(cat,pid,cur,max){
  if(isCerrado(T.num))return;
  const cell=document.getElementById('tc_'+pid);if(!cell)return;
  cell.innerHTML=`<div class="total-edit-wrap">
    <input type="number" class="total-input" id="te_${pid}" min="0" max="${max}" value="${cur}"
      onkeydown="if(event.key==='Enter')saveEdit('${cat}','${pid}',${max});if(event.key==='Escape')renderOpTable()">
    <button class="btn-save" onclick="saveEdit('${cat}','${pid}',${max})"><i class="ti ti-check"></i></button>
    <button class="btn-cancel-edit" onclick="renderOpTable()"><i class="ti ti-x"></i></button>
  </div>`;
  setTimeout(()=>document.getElementById('te_'+pid)?.select(),50);
}
function saveEdit(cat,pid,max){
  const v=parseInt(document.getElementById('te_'+pid)?.value)||0;
  if(v<0||v>max){toast('Cantidad inválida','error');return;}
  setSale(cat,pid,v);toast('✓ Corregido','success');
  updateCierreBar();renderOpTable();
}
function chkOver(inp,max){
  const qty=parseInt(inp.value)||0,pid=inp.id.replace('q_','');
  const warn=document.getElementById('warn_'+pid),btn=document.getElementById('btn_'+pid);
  if(qty>max){inp.classList.add('over');if(warn)warn.style.display='block';if(btn)btn.disabled=true;}
  else{inp.classList.remove('over');if(warn)warn.style.display='none';if(btn)btn.disabled=false;}
}
function doAdd(cat,id,nombre,precio,sf){
  if(isCerrado(T.num)){toast('Turno cerrado','error');return;}
  const qty=parseInt(document.getElementById('q_'+id)?.value)||0;
  if(qty<=0){toast('Ingresá una cantidad mayor a 0','error');return;}
  if(qty>getStock(products[cat].find(x=>x.id===id)||{stockInicial:0})){toast(`Stock insuficiente (disponible: ${sf})`,'error');return;}
  addSale(cat,id,qty);
  const inp=document.getElementById('q_'+id);if(inp){inp.value=0;inp.classList.remove('over');}
  const warn=document.getElementById('warn_'+id);if(warn)warn.style.display='none';
  toast(`✓ +${qty} × ${nombre} → $${(qty*precio).toLocaleString('es-AR')}`,'success');
  updateCierreBar();renderOpTable();
}
function turnoTotals(){
  const s=LS.sales(),k=`T${T.num}`;let u=0,m=0;
  for(const cat of CATS){if(!s[k]?.[cat])continue;
    for(const[pid,qty]of Object.entries(s[k][cat])){
      const p=Object.values(products).flat().find(x=>x.id===pid);if(p){u+=qty;m+=qty*p.precio;}
    }}
  return{u,m};
}
function updateCierreBar(){
  const bar=document.getElementById('cierre-bar'),info=document.getElementById('cierre-info'),btn=document.getElementById('cierre-btn');
  if(!bar||!info||!btn)return;
  const cerrado=isCerrado(T.num),c=LS.cierres()[`T${T.num}`];
  if(cerrado){
    bar.className='cierre-bar cerrado';
    info.innerHTML=`<span style="color:#6b7280"><i class="ti ti-lock"></i> <strong>Planilla ${pStr(T.num)} cerrada</strong>${c?' · '+c.user+' · '+c.hora:''}</span>`;
    btn.style.display='none';
  }else{
    bar.className='cierre-bar';
    const{u,m}=turnoTotals();
    info.innerHTML=`Planilla <strong>${pStr(T.num)}</strong> · ${u>0?`<strong>${u} producto${u!==1?'s':''} vendido${u!==1?'s':''} · $${m.toLocaleString('es-AR')}</strong>`:'Sin ventas aún'}`;
    btn.style.display='';
  }
}
function confirmarCierre(){
  const check=puedeHacerTurno();
  if(!check.ok){showModal(`<h2 style="color:#A32D2D"><i class="ti ti-alert-circle"></i> Turno no permitido</h2><p>${check.msg}</p>`,
    [{txt:'Entendido',cls:'btn-primary',fn:'closeModal()'}]);return;}
  const{u,m}=turnoTotals();
  showModal(`<h2><i class="ti ti-lock"></i> ¿Cerrar turno?</h2>
    <p>Planilla <strong>${pStr(T.num)}</strong> · Turno <strong>${T.nombre}</strong> · ${T.fecha}<br><br>
    <strong>${u} unidades</strong> · Total: <strong>$${m.toLocaleString('es-AR')}</strong><br><br>
    Una vez cerrado no podés agregar más ventas.</p>`,
    [{txt:'Cancelar',cls:'',fn:'closeModal()'},{txt:'Confirmar cierre',cls:'btn-green',fn:`ejecutarCierre(${u},${m})`}]);
}
function puedeHacerTurno(){
  if(currentUser.refuerzo)return{ok:true};
  const prev=T.num-1;if(prev<P0)return{ok:true};
  const c=LS.cierres()[`T${prev}`];
  if(c&&c.user===currentUser.name)
    return{ok:false,msg:`No podés hacer dos turnos consecutivos. Cerraste la planilla <strong>${pStr(prev)}</strong>. Este turno lo debe cerrar otro empleado.`};
  return{ok:true};
}
function ejecutarCierre(u,m){
  const c=LS.cierres();
  c[`T${T.num}`]={user:currentUser.name,hora:ahoraAR().hhmm,fecha:T.fecha,fk:T.fk,ti:T.ti,planilla:T.num,nombre:T.nombre,totalU:u,totalM:m};
  LS.saveCierres(c);
  closeModal();
  // Mostrar mensaje y cerrar sesión automáticamente
  document.getElementById('modal').innerHTML=`<div class="modal-overlay">
    <div class="modal">
      <div style="font-size:48px;margin-bottom:.5rem">✅</div>
      <h2>Turno cerrado</h2>
      <p style="margin-bottom:1.5rem">Planilla <strong>${pStr(T.num)}</strong> informada correctamente.<br>Debe iniciar sesión quien sigue en su turno.</p>
      <button class="btn btn-primary btn-block" onclick="closeModal();logout()">
        <i class="ti ti-login"></i> Ir al inicio de sesión
      </button>
    </div>
  </div>`;
}

function renderResumen(){
  if(!admFk)admFk=T.fk;
  const fk=admFk;
  const diff=diffDiasFk(FK_INICIO,fk);
  const day=new Date(fk+'T12:00:00');
  const esHoy=fk===T.fk;
  const esPrimerDia=diff<=0;
  const ar=ahoraAR();
  const tiActual=ar.hora>=7&&ar.hora<15?0:ar.hora>=15&&ar.hora<23?1:2;

  // Navegación
  const prev=new Date(day);prev.setDate(prev.getDate()-1);
  const next=new Date(day);next.setDate(next.getDate()+1);
  const prevFk=prev.getFullYear()+'-'+String(prev.getMonth()+1).padStart(2,'0')+'-'+String(prev.getDate()).padStart(2,'0');
  const nextFk=next.getFullYear()+'-'+String(next.getMonth()+1).padStart(2,'0')+'-'+String(next.getDate()).padStart(2,'0');

  // Turno cards
  const planes=planillasDia(fk);
  const turnoCards=planes.map(p=>{
    if(p.num===null) return `<div class="turno-card" style="opacity:.35">
      <div style="margin-bottom:5px"><span class="badge badge-${p.nombre}">${p.nombre}</span></div>
      <div style="font-size:12px;color:#9ca3af">no aplica</div>
    </div>`;
    const cerrado=isCerrado(p.num);
    const c=LS.cierres()[p.k]||null;
    let monto=0;
    if(c){monto=c.totalM;}
    else{
      const s=LS.sales();
      if(s[p.k])for(const cat of CATS)if(s[p.k][cat])
        for(const[pid,qty]of Object.entries(s[p.k][cat])){
          const prod=(products[cat]||[]).find(x=>x.id===pid);if(prod)monto+=qty*prod.precio;
        }
    }
    let estado,estadoHtml,valorHtml;
    const turnoActivo = window._turnosActivos?.[p.k];
    // No mostrar como "en curso" si el único activo es Franco mismo
    const activoEsOtro = turnoActivo && turnoActivo.user !== currentUser?.name;
    if(cerrado){
      estado='cerrado';
      estadoHtml=`<span style="font-size:10px;background:#f3f4f6;color:#6b7280;padding:2px 7px;border-radius:999px;font-weight:600"><i class="ti ti-lock" style="font-size:9px"></i> cerrado</span>`;
      valorHtml=`<div style="font-size:18px;font-weight:700;margin:4px 0">$${monto.toLocaleString('es-AR')}</div>`;
    }else if(activoEsOtro){
      // Hay otro empleado activo en este turno ahora mismo
      estado='activo';
      estadoHtml=`<span style="font-size:10px;color:#27500A;font-weight:600;background:#EAF3DE;padding:2px 7px;border-radius:999px">● en curso</span>`;
      valorHtml=`<div style="font-size:12px;color:#27500A;font-weight:500;margin:4px 0"><i class="ti ti-user" style="font-size:11px"></i> ${turnoActivo.user}</div>`;
    }else if(diff>0){
      estado='pendiente';
      estadoHtml=`<span style="font-size:10px;color:#9ca3af">○ no iniciado</span>`;
      valorHtml=`<div style="font-size:13px;color:#d1d5db;margin:4px 0">—</div>`;
    }else if(esHoy&&p.ti>tiActual){
      estado='pendiente';
      estadoHtml=`<span style="font-size:10px;color:#9ca3af">○ no iniciado</span>`;
      valorHtml=`<div style="font-size:13px;color:#d1d5db;margin:4px 0">—</div>`;
    }else if(esHoy&&p.ti===tiActual){
      estado='abierto';
      estadoHtml=`<span style="font-size:10px;color:#f59e0b;font-weight:600">● abierto</span>`;
      valorHtml=`<div style="font-size:13px;color:#f59e0b;font-weight:500;margin:4px 0">no iniciado</div>`;
    }else{
      estado='abierto';
      estadoHtml=`<span style="font-size:10px;color:#f59e0b;font-weight:600">● abierto</span>`;
      valorHtml=`<div style="font-size:13px;color:#f59e0b;font-weight:500;margin:4px 0">en curso</div>`;
    }
    return `<div class="turno-card">
      <div style="display:flex;align-items:center;justify-content:center;gap:5px;flex-wrap:wrap;margin-bottom:4px">
        <span class="badge badge-${p.nombre}">${p.nombre}</span>
        <span style="font-size:10px;color:#9ca3af">${pStr(p.num)}</span>
        ${estadoHtml}
      </div>
      ${valorHtml}
      ${c?`<div style="font-size:11px;color:#6b7280">${c.user} · ${c.hora}</div>`:''}
      ${cerrado?`<div style="margin-top:8px;display:flex;gap:4px;justify-content:center">
        <button class="btn btn-sm" style="font-size:11px;color:#185FA5;border-color:#185FA5" onclick="reabrirTurno('${p.k}',${p.num})"><i class="ti ti-lock-open"></i> Reabrir</button>
        <button class="btn btn-sm" style="font-size:11px;color:#A32D2D;border-color:#A32D2D" onclick="borrarTurno('${p.k}',${p.num})"><i class="ti ti-trash"></i></button>
      </div>`:''}
    </div>`;
  }).join('');

  // Totales del día (solo turnos cerrados) - sumar TODAS las categorías para métricas
  const cat=CATS[admCat];
  const rows=(products[cat]||[]).filter(p=>p.nombre).map(p=>{
    const v=getSalesDiaCerrados(cat,p.id,fk);
    return{...p,ventas:v,monto:v*p.precio,sf:p.stockInicial-v};
  });
  // Métricas globales (todas las categorías)
  let totU=0, totM=0, totP=0;
  for(const c of CATS){
    for(const p of (products[c]||[]).filter(x=>x.nombre)){
      const v=getSalesDiaCerrados(c,p.id,fk);
      totU+=v;
      totM+=v*p.precio;
      if(v>0) totP++;
    }
  }

  return`
  <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:1rem;flex-wrap:wrap;gap:8px">
    <div style="display:flex;align-items:center;gap:8px">
      <button class="btn btn-sm" onclick="admFk='${prevFk}';renderAdmContent()" ${esPrimerDia?'disabled':''}><i class="ti ti-chevron-left"></i></button>
      <strong style="font-size:15px">${fkDisplay(fk)}</strong>
      <button class="btn btn-sm" onclick="admFk='${nextFk}';renderAdmContent()" ${esHoy?'disabled':''}><i class="ti ti-chevron-right"></i></button>
    </div>
    ${!esHoy?`<button class="btn btn-sm btn-primary" onclick="admFk='${T.fk}';renderAdmContent()"><i class="ti ti-calendar"></i> Hoy</button>`:'<span style="font-size:12px;color:#27500A;font-weight:500">● Hoy</span>'}
  </div>
  <div class="metrics">
    <div class="metric"><div class="metric-val">${totU}</div><div class="metric-lbl">Unidades vendidas (turnos cerrados)</div></div>
    <div class="metric"><div class="metric-val">$${totM.toLocaleString('es-AR')}</div><div class="metric-lbl">Monto (turnos cerrados)</div></div>
    <div class="metric"><div class="metric-val">${totP}</div><div class="metric-lbl">Productos movidos</div></div>
  </div>
  <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:1rem">${turnoCards}</div>
  <div class="tab-bar">${CATS.map((c,i)=>`<button class="tab ${i===admCat?'active':''}" onclick="admCat=${i};renderAdmContent()">${c}</button>`).join('')}</div>
  <div class="table-wrap"><table>
    <thead><tr><th>Producto</th><th>Precio</th><th>Stock ini.</th><th class="col-venta">Ventas del día</th><th>Stock final</th><th>Monto</th></tr></thead>
    <tbody>${rows.map(r=>`<tr style="${r.ventas>0?'font-weight:500':''}">
      <td>${r.nombre}</td><td>$${r.precio.toLocaleString('es-AR')}</td><td>${r.stockInicial}</td>
      <td class="col-venta" style="text-align:center">${r.ventas>0?`<span class="badge badge-ok">${r.ventas}</span>`:'—'}</td>
      <td class="${r.sf<=0?'stock-out':''}">${r.sf}</td>
      <td>${r.monto>0?'$'+r.monto.toLocaleString('es-AR'):'—'}</td>
    </tr>`).join('')}</tbody>
  </table></div>`;
}

function reabrirTurno(k,num){
  showModal(`<h2><i class="ti ti-lock-open"></i> ¿Reabrir turno?</h2>
    <p>La planilla <strong>${pStr(num)}</strong> volverá a estar abierta.</p>`,
    [{txt:'Cancelar',cls:'',fn:'closeModal()'},{txt:'Reabrir',cls:'btn-primary',fn:`confirmarReabrir('${k}')`}]);
}
function confirmarReabrir(k){const c=LS.cierres();delete c[k];LS.saveCierres(c);closeModal();toast('✓ Turno reabierto','success');renderAdmContent();}
function borrarTurno(k,num){
  showModal(`<h2 style="color:#A32D2D"><i class="ti ti-trash"></i> ¿Borrar turno?</h2>
    <p>Se eliminarán <strong>todas las ventas</strong> de la planilla <strong>${pStr(num)}</strong>. No se puede deshacer.</p>`,
    [{txt:'Cancelar',cls:'',fn:'closeModal()'},{txt:'Borrar todo',cls:'btn-danger',fn:`confirmarBorrar('${k}')`}]);
}
function confirmarBorrar(k){const s=LS.sales();delete s[k];LS.saveSales(s);const c=LS.cierres();delete c[k];LS.saveCierres(c);closeModal();toast('Turno eliminado','error');renderAdmContent();}

function fkFromDate(d){
  return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');
}

function renderReporteRango(items){
  // Estado del reporte (guardado en variables globales)
  const desde = window._rptDesde||'';
  const hasta = window._rptHasta||'';
  const turnoDesde = window._rptTurnoDesde||0;
  const turnoHasta = window._rptTurnoHasta||2;
  const mostrar = window._rptMostrar||false;

  let resultHtml = '';
  if(mostrar && desde && hasta){
    const s=LS.sales();
    // Filtrar turnos cerrados en el rango
    const turnosRango = items.filter(([k,v])=>{
      if(!v.fecha||!v.planilla) return false;
      const fk = v.fk || fechaAFk(v.fecha);
      if(!fk) return false;
      const diff1 = diffDiasFk(desde, fk);
      const diff2 = diffDiasFk(fk, hasta);
      if(diff1<0||diff2<0) return false;
      // Verificar turno dentro del rango
      const ti = v.ti!==undefined ? v.ti : tiFromNombre(v.nombre||'');
      if(diff1===0 && ti < turnoDesde) return false;
      if(diff2===0 && ti > turnoHasta) return false;
      return true;
    });

    if(turnosRango.length===0){
      resultHtml=`<div class="alert alert-info" style="margin-bottom:1rem"><i class="ti ti-info-circle"></i> No hay turnos cerrados en ese rango.</div>`;
    } else {
      // Acumular ventas por categoría
      const resumen={};
      for(const cat of CATS) resumen[cat]={};
      let totalU=0,totalM=0,totalTurnos=turnosRango.length;

      for(const [k,v] of turnosRango){
        const ventas=s[k]||{};
        for(const cat of CATS){
          if(!ventas[cat]) continue;
          for(const [pid,qty] of Object.entries(ventas[cat])){
            if(!resumen[cat][pid]) resumen[cat][pid]=0;
            resumen[cat][pid]+=qty;
            const p=(products[cat]||[]).find(x=>x.id===pid);
            totalU+=qty;
            if(p) totalM+=qty*p.precio;
          }
        }
      }

      resultHtml=`<div class="card" style="border:2px solid #185FA5">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:1rem;flex-wrap:wrap;gap:8px">
          <div class="section-title" style="margin:0"><i class="ti ti-chart-bar"></i> Reporte: ${fkDisplay(desde)} → ${fkDisplay(hasta)}</div>
          <div style="font-size:13px;color:#6b7280">${totalTurnos} turno${totalTurnos!==1?'s':''} · <strong>${totalU} uds</strong> · <strong>$${totalM.toLocaleString('es-AR')}</strong></div>
        </div>
        ${CATS.map(cat=>{
          const prods=Object.entries(resumen[cat]).filter(([,q])=>q>0);
          if(!prods.length) return `<div style="margin-bottom:1rem"><strong style="font-size:12px;text-transform:uppercase;color:#6b7280">${cat}</strong> <span style="font-size:12px;color:#9ca3af">— Sin ventas</span></div>`;
          let catU=0,catM=0;
          prods.forEach(([pid,qty])=>{const p=(products[cat]||[]).find(x=>x.id===pid);if(p)catM+=qty*p.precio;catU+=qty;});
          return`<div style="margin-bottom:1.25rem">
            <div style="display:flex;justify-content:space-between;margin-bottom:6px">
              <strong style="font-size:12px;text-transform:uppercase;color:#6b7280;letter-spacing:.5px">${cat}</strong>
              <span style="font-size:12px;color:#6b7280">${catU} uds · $${catM.toLocaleString('es-AR')}</span>
            </div>
            <table style="width:100%;font-size:13px;border-collapse:collapse">
              <thead><tr>
                <th style="text-align:left;padding:5px 8px;color:#6b7280;font-weight:500;border-bottom:1px solid #e5e7eb;background:#f9fafb">Producto</th>
                <th style="text-align:center;padding:5px 8px;color:#6b7280;font-weight:500;border-bottom:1px solid #e5e7eb;background:#f9fafb">Cant.</th>
                <th style="text-align:right;padding:5px 8px;color:#6b7280;font-weight:500;border-bottom:1px solid #e5e7eb;background:#f9fafb">Total</th>
              </tr></thead><tbody>
              ${prods.sort((a,b)=>b[1]-a[1]).map(([pid,qty])=>{
                const p=(products[cat]||[]).find(x=>x.id===pid);
                const subtotal=p?qty*p.precio:0;
                return`<tr>
                  <td style="padding:5px 8px;border-bottom:1px solid #f3f4f6">${p?p.nombre:pid}</td>
                  <td style="padding:5px 8px;text-align:center;border-bottom:1px solid #f3f4f6"><span class="badge badge-ok">${qty}</span></td>
                  <td style="padding:5px 8px;text-align:right;border-bottom:1px solid #f3f4f6;font-weight:600">${subtotal>0?'$'+subtotal.toLocaleString('es-AR'):'—'}</td>
                </tr>`;
              }).join('')}
            </tbody></table>
          </div>`;
        }).join('')}
      </div>`;
    }
  }

  const hoy = T.fk;
  return`<div class="card" style="margin-bottom:1rem">
    <div class="section-title"><i class="ti ti-calendar-stats"></i> Reporte por rango de fechas</div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:12px">
      <div>
        <label style="font-size:12px;color:#6b7280;margin-bottom:4px;display:block">Desde</label>
        <div style="display:flex;gap:6px;align-items:center">
          <input type="date" id="rpt-desde" value="${desde||hoy}" min="2026-06-13" max="${hoy}"
            style="flex:1;margin:0;padding:7px 10px;font-size:13px">
          <select id="rpt-turno-desde" style="width:100px;margin:0;padding:7px 6px;font-size:13px">
            ${TURNOS.map((t,i)=>`<option value="${i}" ${i===turnoDesde?'selected':''}>${t}</option>`).join('')}
          </select>
        </div>
      </div>
      <div>
        <label style="font-size:12px;color:#6b7280;margin-bottom:4px;display:block">Hasta</label>
        <div style="display:flex;gap:6px;align-items:center">
          <input type="date" id="rpt-hasta" value="${hasta||hoy}" min="2026-06-13" max="${hoy}"
            style="flex:1;margin:0;padding:7px 10px;font-size:13px">
          <select id="rpt-turno-hasta" style="width:100px;margin:0;padding:7px 6px;font-size:13px">
            ${TURNOS.map((t,i)=>`<option value="${i}" ${i===turnoHasta?'selected':''}>${t}</option>`).join('')}
          </select>
        </div>
      </div>
    </div>
    <button class="btn btn-primary" onclick="generarReporte()"><i class="ti ti-search"></i> Generar reporte</button>
  </div>
  ${resultHtml}`;
}

function fechaAFk(fechaStr){
  // Convierte "16/6/2026" a "2026-06-16"
  if(!fechaStr) return null;
  const p=fechaStr.split('/');
  if(p.length!==3) return null;
  return `${p[2]}-${p[1].padStart(2,'0')}-${p[0].padStart(2,'0')}`;
}
function tiFromNombre(nombre){
  return nombre==='mañana'?0:nombre==='tarde'?1:2;
}

function generarReporte(){
  window._rptDesde = document.getElementById('rpt-desde')?.value||T.fk;
  window._rptHasta = document.getElementById('rpt-hasta')?.value||T.fk;
  window._rptTurnoDesde = parseInt(document.getElementById('rpt-turno-desde')?.value)||0;
  window._rptTurnoHasta = parseInt(document.getElementById('rpt-turno-hasta')?.value)||2;
  window._rptMostrar = true;
  renderAdmContent();
}

function renderTurnos(){
  const c=LS.cierres();
  const items=Object.entries(c).sort((a,b)=>b[1].planilla-a[1].planilla);
  if(!items.length)return'<div class="alert alert-info">Aún no hay turnos cerrados.</div>';
  
  // Reporte por rango
  const reporteHtml = renderReporteRango(items);
  let html=reporteHtml+`<div class="card"><div class="section-title"><i class="ti ti-clock"></i> Turnos cerrados — clic en una fila para ver detalle</div>
    <div class="table-wrap"><table>
      <thead><tr><th>Planilla</th><th>Turno</th><th>Fecha</th><th>Cerrado por</th><th>Hora</th><th>Total vendido</th><th>Total</th><th></th></tr></thead>
      <tbody>`;
  for(const[k,v]of items){
    const isOpen=admDetailKey===k;
    const nom=v.nombre||'';
    html+=`<tr style="cursor:pointer" onclick="admDetailKey=admDetailKey==='${k}'?null:'${k}';renderAdmContent()">
      <td><strong>${pStr(v.planilla)}</strong></td>
      <td>${nom?`<span class="badge badge-${nom}">${nom}</span>`:''}</td>
      <td>${v.fecha}</td>
      <td>${v.user}${v.editado?` <span style="font-size:10px;color:#185FA5">(editado)</span>`:''}</td>
      <td>${v.hora}</td><td style="font-weight:600">${v.totalU} uds</td>
      <td>$${v.totalM.toLocaleString('es-AR')}</td>
      <td><i class="ti ti-chevron-${isOpen?'up':'down'}" style="color:#9ca3af"></i></td>
    </tr>`;
    if(isOpen){
      html+=`<tr><td colspan="8" style="padding:0;background:#f9fafb">
        <div style="padding:1rem">${admEditKey===k?renderEditTurno(k,v):renderDetalleTurno(k,v)}</div>
      </td></tr>`;
    }
  }
  html+='</tbody></table></div></div>';
  return html;
}

function renderDetalleTurno(k,v){
  const s=LS.sales()[k]||{};
  let html=`<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;flex-wrap:wrap;gap:8px">
    <strong>Planilla ${pStr(v.planilla)} · ${v.nombre||''} · ${v.fecha} — ${v.user} · ${v.hora}</strong>
    <button class="btn btn-sm" style="color:#185FA5;border-color:#185FA5" onclick="admEditKey='${k}';renderAdmContent()">
      <i class="ti ti-edit"></i> Corregir ventas
    </button>
  </div>`;
  let hay=false,totU=0,totM=0;
  for(const cat of CATS){
    const prods=Object.entries(s[cat]||{}).filter(([,q])=>q>0);
    if(!prods.length)continue;hay=true;
    html+=`<div style="font-size:11px;font-weight:700;color:#6b7280;margin:8px 0 4px;text-transform:uppercase">${cat}</div>`;
    html+=`<table style="width:100%;font-size:13px;border-collapse:collapse"><thead><tr>
      <th style="padding:4px 8px;text-align:left;color:#6b7280;font-weight:500;border-bottom:1px solid #e5e7eb">Producto</th>
      <th style="padding:4px 8px;text-align:center;color:#6b7280;font-weight:500;border-bottom:1px solid #e5e7eb">Cant.</th>
      <th style="padding:4px 8px;text-align:right;color:#6b7280;font-weight:500;border-bottom:1px solid #e5e7eb">Precio</th>
      <th style="padding:4px 8px;text-align:right;color:#6b7280;font-weight:500;border-bottom:1px solid #e5e7eb">Subtotal</th>
    </tr></thead><tbody>`;
    for(const[pid,qty]of prods){
      const p=(products[cat]||[]).find(x=>x.id===pid);
      totU+=qty;totM+=qty*(p?.precio||0);
      html+=`<tr><td style="padding:4px 8px;border-bottom:1px solid #f3f4f6">${p?.nombre||pid}</td>
        <td style="padding:4px 8px;text-align:center;border-bottom:1px solid #f3f4f6"><span class="badge badge-ok">${qty}</span></td>
        <td style="padding:4px 8px;text-align:right;border-bottom:1px solid #f3f4f6;color:#6b7280">$${(p?.precio||0).toLocaleString('es-AR')}</td>
        <td style="padding:4px 8px;text-align:right;border-bottom:1px solid #f3f4f6;font-weight:600">$${(qty*(p?.precio||0)).toLocaleString('es-AR')}</td>
      </tr>`;
    }
    html+='</tbody></table>';
  }
  if(!hay)html+='<p style="color:#9ca3af;font-size:13px">Sin ventas.</p>';
  html+=`<div style="margin-top:10px;text-align:right;font-weight:700">Total: $${totM.toLocaleString('es-AR')} · ${totU} unidades vendidas</div>`;
  return html;
}

function renderEditTurno(k,v){
  let html=`<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;flex-wrap:wrap;gap:8px">
    <strong>Corregir ventas — Planilla ${pStr(v.planilla)}</strong>
    <button class="btn btn-sm" onclick="admEditKey=null;renderAdmContent()"><i class="ti ti-x"></i> Cancelar</button>
  </div>`;
  const s=LS.sales()[k]||{};
  for(const cat of CATS){
    const prods=(products[cat]||[]).filter(p=>p.nombre);
    if(!prods.length)continue;
    html+=`<div style="font-size:11px;font-weight:700;color:#6b7280;margin:10px 0 4px;text-transform:uppercase">${cat}</div>`;
    html+=`<table style="width:100%;font-size:13px;border-collapse:collapse"><thead><tr>
      <th style="padding:4px 8px;text-align:left;color:#6b7280;font-weight:500;border-bottom:1px solid #e5e7eb;background:#f9fafb">Producto</th>
      <th style="padding:4px 8px;text-align:center;color:#6b7280;font-weight:500;border-bottom:1px solid #e5e7eb;background:#f9fafb;width:90px">Cantidad</th>
      <th style="padding:4px 8px;text-align:right;color:#6b7280;font-weight:500;border-bottom:1px solid #e5e7eb;background:#f9fafb">Precio</th>
    </tr></thead><tbody>`;
    for(const p of prods){
      const qty=(s[cat]||{})[p.id]||0;
      html+=`<tr><td style="padding:4px 8px;border-bottom:1px solid #f3f4f6">${p.nombre}</td>
        <td style="padding:3px 8px;border-bottom:1px solid #f3f4f6;text-align:center">
          <input type="number" min="0" value="${qty}" id="ed_${k}_${cat}_${p.id}"
            style="width:65px;padding:4px;text-align:center;border:1.5px solid #3B6D11;border-radius:6px;font-size:13px;font-family:inherit">
        </td>
        <td style="padding:4px 8px;border-bottom:1px solid #f3f4f6;text-align:right;color:#6b7280">$${p.precio.toLocaleString('es-AR')}</td>
      </tr>`;
    }
    html+='</tbody></table>';
  }
  html+=`<div style="margin-top:14px;text-align:right">
    <button class="btn btn-green" onclick="guardarEdicion('${k}')"><i class="ti ti-device-floppy"></i> Guardar correcciones</button>
  </div>`;
  return html;
}

function guardarEdicion(k){
  const s=LS.sales();if(!s[k])s[k]={};
  let totU=0,totM=0;
  for(const cat of CATS){
    s[k][cat]={};
    for(const p of (products[cat]||[])){
      const inp=document.getElementById(`ed_${k}_${cat}_${p.id}`);
      if(!inp)continue;
      const qty=parseInt(inp.value)||0;
      if(qty>0){s[k][cat][p.id]=qty;totU+=qty;totM+=qty*p.precio;}
    }
  }
  LS.saveSales(s);
  const c=LS.cierres();
  if(c[k]){c[k].totalU=totU;c[k].totalM=totM;c[k].editado=true;}
  LS.saveCierres(c);
  admEditKey=null;
  toast('✓ Correcciones guardadas','success');
  renderAdmContent();
}

function getP0real(){return parseInt(localStorage.getItem('nv4_p0')||String(P0));}
function setP0real(n){localStorage.setItem('nv4_p0',String(n));}

// Variables para carga de turno pasado
let _cargaFk = null;
let _cargaTi = null;
let _cargaCat = 0;

function getFkAyer(){
  // Fecha de ayer en Argentina
  const ar = ahoraAR();
  const d = new Date(ar.fk+'T12:00:00');
  d.setDate(d.getDate()-1);
  return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');
}

function planillaNumPasado(fk, ti){
  // Calcula número de planilla para cualquier fecha+turno pasado
  const diff = diffDiasFk(FK_INICIO, fk);
  if(diff < 0) return null; // antes del inicio del sistema
  const num = planillaNum(diff, ti);
  return num; // puede ser null para mañana del 13/6
}

function renderCargaTurno(){
  const ayer = getFkAyer();
  const fkSel = _cargaFk || ayer;
  const tiSel = _cargaTi !== null ? _cargaTi : 2; // default noche

  if(!_cargaFk || _cargaTi === null){
    // Calcular planilla preview
    const prevNum = planillaNumPasado(fkSel, tiSel);

    return`<div class="card">
      <div class="section-title"><i class="ti ti-edit"></i> Cargar turno no informado</div>
      <p style="font-size:13px;color:#6b7280;margin-bottom:1rem">
        Seleccioná la fecha y turno que no fue informado. Solo podés cargar turnos del día anterior hacia atrás.
      </p>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:8px">
        <div>
          <label>Fecha (máximo hasta ayer)</label>
          <input type="date" id="carga-fecha" value="${fkSel}"
            min="2026-06-13" max="${ayer}"
            style="margin:0" onchange="actualizarPreviewCarga()">
        </div>
        <div>
          <label>Turno</label>
          <select id="carga-turno" style="margin:0" onchange="actualizarPreviewCarga()">
            ${TURNOS.map((t,i)=>`<option value="${i}" ${i===tiSel?'selected':''}>${t}</option>`).join('')}
          </select>
        </div>
      </div>
      <div id="carga-preview" style="margin-bottom:1rem;font-size:13px;color:#6b7280;padding:8px 12px;background:#f9fafb;border-radius:8px;border:1px solid #e5e7eb">
        ${prevNum
          ? isCerrado(prevNum)
            ? `<span style="color:#A32D2D"><i class="ti ti-lock"></i> Planilla ${pStr(prevNum)} ya está cerrada</span>`
            : `<span style="color:#27500A"><i class="ti ti-circle-check"></i> Planilla <strong>${pStr(prevNum)}</strong> · ${TURNOS[tiSel]} del ${fkDisplay(fkSel)} — disponible para cargar</span>`
          : `<span style="color:#A32D2D"><i class="ti ti-alert-circle"></i> Este turno no existe en el sistema</span>`
        }
      </div>
      <button class="btn btn-primary" onclick="seleccionarCargaTurno()">
        <i class="ti ti-arrow-right"></i> Continuar
      </button>
    </div>`;
  }

  // Calcular número de planilla
  const num = planillaNumPasado(_cargaFk, _cargaTi);
  if(!num) return `<div class="card"><div class="alert alert-danger">Este turno no existe en el sistema (${TURNOS[_cargaTi]} del ${fkDisplay(_cargaFk)} es anterior al inicio).</div>
    <button class="btn" onclick="_cargaFk=null;_cargaTi=null;renderAdmContent()"><i class="ti ti-arrow-left"></i> Volver</button></div>`;

  if(isCerrado(num)){
    return`<div class="card">
      <div class="alert alert-warning"><i class="ti ti-lock"></i> La planilla <strong>${pStr(num)}</strong> (${TURNOS[_cargaTi]} del ${fkDisplay(_cargaFk)}) ya fue cerrada e informada.</div>
      <button class="btn" onclick="_cargaFk=null;_cargaTi=null;renderAdmContent()"><i class="ti ti-arrow-left"></i> Volver</button>
    </div>`;
  }

  const cat = CATS[_cargaCat];
  const prods = (products[cat]||[]).filter(p=>p.nombre);
  const s = LS.sales();
  const k = `T${num}`;

  return`<div class="card">
    <div style="display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px;margin-bottom:1rem">
      <div>
        <div class="section-title" style="margin:0"><i class="ti ti-edit"></i> Planilla ${pStr(num)}</div>
        <div style="font-size:13px;color:#6b7280">Turno <strong>${TURNOS[_cargaTi]}</strong> · ${fkDisplay(_cargaFk)}</div>
      </div>
      <button class="btn btn-sm" onclick="_cargaFk=null;_cargaTi=null;renderAdmContent()"><i class="ti ti-x"></i> Cancelar</button>
    </div>
    <div class="alert alert-info"><i class="ti ti-info-circle"></i> Ingresá las cantidades vendidas en ese turno. Al terminar, cerrá e informá.</div>
    <div class="tab-bar">
      ${CATS.map((c,i)=>`<button class="tab ${i===_cargaCat?'active':''}" onclick="_cargaCat=${i};renderAdmContent()">${c}</button>`).join('')}
    </div>
    <div class="table-wrap" style="margin-bottom:1rem"><table>
      <thead><tr>
        <th style="min-width:180px">Producto</th>
        <th>Precio</th>
        <th>Stock ini.</th>
        <th class="col-venta">✏ Cantidad vendida</th>
        <th>Ya cargado</th>
      </tr></thead><tbody>
      ${prods.map(p=>{
        const yaC = (s[k]?.[cat]?.[p.id])||0;
        const gasH = cat==='Gas + Hielo';
        const esc = p.id.replace(/'/g,"\'");
        return`<tr>
          <td><strong>${p.nombre}</strong></td>
          <td>${p.precio>0?'$'+p.precio.toLocaleString('es-AR'):'—'}</td>
          <td>${gasH?'—':p.stockInicial}</td>
          <td class="col-venta">
            <div class="venta-wrap">
              <input type="number" class="venta-input" id="cq_${p.id}" min="0" value="0"
                onkeydown="if(event.key==='Enter')doCargaAdd('${cat}','${esc}',${num})">
              <button class="btn-add" onclick="doCargaAdd('${cat}','${esc}',${num})">
                <i class="ti ti-plus"></i> ✓
              </button>
            </div>
          </td>
          <td style="text-align:center">${yaC>0?`<span class="badge badge-ok">${yaC}</span>`:'—'}</td>
        </tr>`;
      }).join('')}
      </tbody>
    </table></div>
    <div style="border-top:1px solid #e5e7eb;padding-top:1rem;display:flex;justify-content:flex-end">
      <button class="btn btn-green" onclick="cerrarTurnoPasado(${num},'${_cargaFk}',${_cargaTi})">
        <i class="ti ti-lock"></i> Cerrar e informar planilla ${pStr(num)}
      </button>
    </div>
  </div>`;
}

function actualizarPreviewCarga(){
  const fk = document.getElementById('carga-fecha')?.value || getFkAyer();
  const ti = parseInt(document.getElementById('carga-turno')?.value)||0;
  const num = planillaNumPasado(fk, ti);
  const el = document.getElementById('carga-preview');
  if(!el) return;
  if(!num){
    el.innerHTML=`<span style="color:#A32D2D"><i class="ti ti-alert-circle"></i> Este turno no existe en el sistema</span>`;
  } else if(isCerrado(num)){
    el.innerHTML=`<span style="color:#A32D2D"><i class="ti ti-lock"></i> Planilla ${pStr(num)} ya está cerrada</span>`;
  } else {
    el.innerHTML=`<span style="color:#27500A"><i class="ti ti-circle-check"></i> Planilla <strong>${pStr(num)}</strong> · ${TURNOS[ti]} del ${fkDisplay(fk)} — disponible para cargar</span>`;
  }
}

function seleccionarCargaTurno(){
  const fecha = document.getElementById('carga-fecha')?.value;
  const ti = parseInt(document.getElementById('carga-turno')?.value);
  if(!fecha){ toast('Seleccioná una fecha','error'); return; }
  // Solo permitir hasta ayer
  if(fecha >= T.fk){ toast('Solo podés cargar turnos de días anteriores','error'); return; }
  const num = planillaNumPasado(fecha, ti);
  if(!num){ toast('Este turno no existe en el sistema','error'); return; }
  if(isCerrado(num)){ toast(`La planilla ${pStr(num)} ya está cerrada`,'error'); return; }
  _cargaFk = fecha;
  _cargaTi = ti;
  _cargaCat = 0;
  renderAdmContent();
}

function doCargaAdd(cat, pid, num){
  const inp = document.getElementById('cq_'+pid);
  const qty = parseInt(inp?.value)||0;
  if(qty<=0){ toast('Ingresá una cantidad mayor a 0','error'); return; }
  const s = LS.sales(), k = `T${num}`;
  if(!s[k]) s[k]={};
  if(!s[k][cat]) s[k][cat]={};
  s[k][cat][pid] = (s[k][cat][pid]||0) + qty;
  LS.saveSales(s);
  if(inp){ inp.value=0; }
  const p = (products[cat]||[]).find(x=>x.id===pid);
  toast(`✓ +${qty} × ${p?.nombre||pid}`,'success');
  renderAdmContent();
}

function cerrarTurnoPasado(num, fk, ti){
  const s = LS.sales(), k = `T${num}`;
  let totalU=0, totalM=0;
  for(const cat of CATS){
    if(!s[k]?.[cat]) continue;
    for(const [pid,qty] of Object.entries(s[k][cat])){
      const p = Object.values(products).flat().find(x=>x.id===pid);
      if(p){ totalU+=qty; totalM+=qty*p.precio; }
    }
  }
  showModal(`<h2><i class="ti ti-lock"></i> ¿Cerrar e informar?</h2>
    <p>Planilla <strong>${pStr(num)}</strong><br>
    Turno <strong>${TURNOS[ti]}</strong> · ${fkDisplay(fk)}<br><br>
    <strong>${totalU} unidades</strong> · Total: <strong>$${totalM.toLocaleString('es-AR')}</strong></p>`,
    [{txt:'Cancelar',cls:'',fn:'closeModal()'},{txt:'Confirmar',cls:'btn-green',fn:`ejecutarCierrePasado(${num},'${fk}',${ti},${totalU},${totalM})`}]);
}

async function ejecutarCierrePasado(num, fk, ti, totalU, totalM){
  const ar = ahoraAR();
  const c = LS.cierres();
  c[`T${num}`] = {
    user:'Franco', hora:ar.hhmm, fecha:fkDisplay(fk), fk, ti,
    planilla:num, nombre:TURNOS[ti], totalU, totalM, cargadoManualmente:true
  };
  LS.saveCierres(c);
  await fbSave('sales', LS.sales());
  await fbSave('cierres', c);
  closeModal();
  _cargaFk=null; _cargaTi=null;
  toast('✓ Planilla '+pStr(num)+' cerrada e informada','success');
  admSection='turnos';
  document.querySelectorAll('#screen-admin .tab').forEach(t=>t.classList.remove('active'));
  renderAdmContent();
}

function renderStock(){
  const total=Object.values(products).reduce((a,v)=>a+v.length,0);
  const p0actual=getP0real();
  // Calcular planilla actual con el P0 guardado
  const numActual=planillaNumCustom(T.diff,T.ti,p0actual);
  return`<div class="card">
    <div class="section-title"><i class="ti ti-refresh"></i> Recargar desde Google Sheets</div>
    <p style="font-size:13px;color:#6b7280;margin-bottom:1rem">Trae precios y stock actualizados.</p>
    <button class="btn btn-primary" onclick="loadAllSheets()"><i class="ti ti-refresh"></i> Recargar ahora</button>
    ${sheetsLoaded?`<div class="alert alert-success" style="margin-top:1rem"><i class="ti ti-check"></i> ${total} productos cargados.</div>`:''}
  </div>
  <div class="card">
    <div class="section-title"><i class="ti ti-hash"></i> Ajustar número de planilla</div>
    <p style="font-size:13px;color:#6b7280;margin-bottom:8px">
      Planilla actual del sistema: <strong>${pStr(T.num)}</strong><br>

    </p>
    <p style="font-size:13px;color:#6b7280;margin-bottom:8px">Si el número no coincide, ingresá cuál debería ser la planilla de <strong>hoy ${T.nombre}</strong>:</p>
    <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap">
      <input type="number" id="inp-p0" value="${T.num}" style="width:130px;margin:0;padding:8px 10px">
      <button class="btn btn-primary" onclick="ajustarPlanilla()"><i class="ti ti-check"></i> Aplicar</button>
      ${p0actual!==P0?`<button class="btn" style="color:#A32D2D" onclick="resetPlanilla()"><i class="ti ti-refresh"></i> Resetear</button>`:''}
    </div>
    <p style="font-size:12px;color:#9ca3af;margin-top:8px">El ajuste calcula la diferencia y la aplica a todos los turnos.</p>
  </div>
  <div class="card">
    <div class="section-title"><i class="ti ti-external-link"></i> Google Sheets</div>
    <a href="https://docs.google.com/spreadsheets/d/${SHEET_ID}/edit" target="_blank" class="btn"><i class="ti ti-table"></i> Abrir Google Sheets</a>
  </div>`;
}

function planillaNumCustom(diffDays,ti,p0){
  if(diffDays===0){if(ti<START_TI)return null;return p0+(ti-START_TI);}
  return p0+(3-START_TI)+(diffDays-1)*3+ti;
}

function ajustarPlanilla(){
  const nueva=parseInt(document.getElementById('inp-p0')?.value)||T.num;
  // Calcular nuevo P0: nueva = P0new + (ti-START_TI) para diff=0, o formula general
  // nueva = P0new + offset_desde_inicio
  // offset = planillaNum(T.diff,T.ti) - P0 = T.num - P0
  // P0new = nueva - (T.num - P0)
  const offsetActual=T.num-P0;
  const p0new=nueva-offsetActual;
  setP0real(p0new);
  toast('✓ Planilla ajustada. Recargando...','success');
  setTimeout(()=>location.reload(),1200);
}
function resetPlanilla(){
  localStorage.removeItem('nv4_p0');
  toast('Planilla reseteada al valor original','success');
  setTimeout(()=>location.reload(),1200);
}

function getBloqueados(){return JSON.parse(localStorage.getItem('nv4_bloqueados')||'{}')}
function saveBloqueados(b){
  localStorage.setItem('nv4_bloqueados',JSON.stringify(b));
  fbSave('bloqueados',b);
}

async function toggleBloqueo(uid, nombre){
  const b=getBloqueados();
  const estaBloqueado=!!b[uid];
  if(estaBloqueado){
    // Desbloquear directo
    delete b[uid];
    await fbSave('bloqueados', b);
    localStorage.setItem('nv4_bloqueados', JSON.stringify(b));
    toast(`✓ ${nombre} desbloqueado`,'success');
    renderAdmContent();
  } else {
    // Confirmar bloqueo
    showModal(`<h2 style="color:#A32D2D"><i class="ti ti-ban"></i> ¿Bloquear a ${nombre}?</h2>
      <p>No podrá iniciar sesión hasta que lo desbloquees.</p>`,
      [{txt:'Cancelar',cls:'',fn:'closeModal()'},{txt:'Bloquear',cls:'btn-danger',fn:`confirmarBloqueo('${uid}','${nombre}')`}]);
  }
}
async function confirmarBloqueo(uid, nombre){
  const b=getBloqueados();
  b[uid]=true;
  // Firebase primero
  await fbSave('bloqueados', b);
  localStorage.setItem('nv4_bloqueados', JSON.stringify(b));
  closeModal();
  toast(`${nombre} bloqueado`,'error');
  renderAdmContent();
}

function renderUsuarios(){
  const passes=LS.passes();
  return`<div class="card">
    <div class="section-title"><i class="ti ti-users"></i> Usuarios</div>
    <p style="font-size:13px;color:#6b7280;margin-bottom:1rem">Clic en 🔑 para cambiar contraseña.</p>
    <table><thead><tr><th>Nombre</th><th>Cargo</th><th>Usuario</th><th>Contraseña</th><th></th></tr></thead>
    <tbody>${USERS.map(u=>{
      const pass=passes[u.id]||u.pass;
      const cargoBadgeColor=u.cargo==='Administrador'?'#27500A;background:#EAF3DE':u.cargo==='Jefe de Turno'?'#0C447C;background:#E6F1FB':'#633806;background:#FAEEDA';
      return`<tr>
        <td><strong>${u.name}</strong>${getBloqueados()[u.id]?` <span style="font-size:10px;background:#FCEBEB;color:#A32D2D;padding:2px 7px;border-radius:999px;font-weight:600">bloqueado</span>`:''}</td>
        <td><span style="font-size:11px;font-weight:600;padding:3px 9px;border-radius:999px;color:${cargoBadgeColor}">${u.cargo}</span></td>
        <td><code style="font-size:12px;background:#f3f4f6;padding:2px 6px;border-radius:4px">${u.id}</code></td>
        <td><code style="font-size:12px;background:#f3f4f6;padding:2px 6px;border-radius:4px">${pass}</code></td>
        <td style="white-space:nowrap">
          <button class="btn btn-sm" onclick="editarPass('${u.id}','${u.name}')" title="Cambiar contraseña"><i class="ti ti-key"></i></button>
          ${u.id!=='franco'?`<button class="btn btn-sm" style="${getBloqueados()[u.id]?'color:#A32D2D;border-color:#A32D2D':''}" onclick="toggleBloqueo('${u.id}','${u.name}')" title="${getBloqueados()[u.id]?'Desbloquear':'Bloquear'}">
            <i class="ti ti-${getBloqueados()[u.id]?'lock-open':'ban'}"></i>
          </button>`:''}
        </td>
      </tr>`;
    }).join('')}</tbody></table>
  </div>`;
}
function editarPass(uid,nombre){
  const actual=LS.passes()[uid]||USERS.find(u=>u.id===uid)?.pass||'';
  showModal(`<h2><i class="ti ti-key"></i> Cambiar contraseña</h2>
    <p>Usuario: <strong>${nombre}</strong></p>
    <input type="text" id="inp-new-pass" value="${actual}" style="width:100%;padding:9px 12px;border:1px solid #d1d5db;border-radius:8px;font-size:14px;font-family:inherit;margin-bottom:.5rem"
      onkeydown="if(event.key==='Enter')guardarPass('${uid}')">`,
    [{txt:'Cancelar',cls:'',fn:'closeModal()'},{txt:'Guardar',cls:'btn-primary',fn:`guardarPass('${uid}')`}]);
  setTimeout(()=>{const i=document.getElementById('inp-new-pass');if(i){i.focus();i.select();}},100);
}
async function guardarPass(uid){
  const v=(document.getElementById('inp-new-pass')?.value||'').trim();
  if(v.length<3){toast('Mínimo 3 caracteres','error');return;}
  const p=LS.passes();
  p[uid]=v;
  // Guardar en Firebase primero
  await fbSave('passes', p);
  // Luego localStorage
  localStorage.setItem('nv4_passes', JSON.stringify(p));
  closeModal();
  toast(`✓ Contraseña de ${USERS.find(u=>u.id===uid)?.name} actualizada en todos los dispositivos`,'success');
  renderAdmContent();
}

// ═══════════════════════════════════════════════════
// MODAL Y TOAST
// ═══════════════════════════════════════════════════
function showModal(body,btns){
  document.getElementById('modal').innerHTML=`<div class="modal-overlay">
    <div class="modal">${body}
      <div class="modal-btns">${btns.map(b=>`<button class="btn ${b.cls}" onclick="${b.fn}">${b.txt}</button>`).join('')}</div>
    </div>
  </div>`;
}
function closeModal(){document.getElementById('modal').innerHTML='';}
let toastT;
function toast(msg,type=''){
  const el=document.getElementById('toast');
  el.textContent=msg;el.className=type;el.classList.add('show');
  clearTimeout(toastT);toastT=setTimeout(()=>el.classList.remove('show'),3000);
}
